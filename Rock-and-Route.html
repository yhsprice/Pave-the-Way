<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pave the Way | Rock & Route</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f4f4f4, #e7ecef);
      color: #222;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      padding: 30px;
    }
    .main-title {
      text-align: center;
      font-size: 42px;
      margin-bottom: 8px;
      color: #1d3557;
    }
    .sub-title {
      text-align: center;
      font-size: 28px;
      margin-top: 0;
      margin-bottom: 10px;
      color: #444;
    }
    .tagline {
      text-align: center;
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
    }
    .quiz-box {
      background: #f8fafc;
      border: 2px solid #d9e2ec;
      border-radius: 16px;
      padding: 25px;
    }
    .progress {
      font-size: 15px;
      font-weight: bold;
      color: #555;
      margin-bottom: 12px;
    }
    .question-type {
      display: inline-block;
      background: #dbeafe;
      color: #1e3a8a;
      font-size: 13px;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 15px;
    }
    .question {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .answers {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }
    .answer-btn {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      background: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .answer-btn:hover {
      background: #eef6ff;
      border-color: #93c5fd;
    }
    .answer-btn.correct {
      background: #dcfce7;
      border-color: #22c55e;
      font-weight: bold;
    }
    .answer-btn.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      font-weight: bold;
    }
    .answer-btn:disabled { cursor: default; }
    .feedback {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 10px;
      min-height: 24px;
    }
    .explanation {
      font-size: 15px;
      color: #555;
      margin-bottom: 20px;
      min-height: 40px;
      line-height: 1.5;
    }
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .control-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .next-btn { background: #1d4ed8; color: white; }
    .next-btn:hover { background: #1e40af; }
    .restart-btn { background: #64748b; color: white; }
    .restart-btn:hover { background: #475569; }
    .home-btn { background: #0f766e; color: white; }
    .home-btn:hover { background: #115e59; }
    .score-board {
      margin-top: 20px;
      font-size: 17px;
      font-weight: bold;
      color: #1f2937;
    }
    .hidden { display: none; }
    .result-box {
      text-align: center;
      padding: 20px 10px;
    }
    .result-box h2 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #1d3557;
    }
    .result-box p {
      font-size: 20px;
      color: #444;
      line-height: 1.5;
    }
    @media (max-width: 700px) {
      .main-title { font-size: 34px; }
      .sub-title { font-size: 24px; }
      .question { font-size: 20px; }
      .container {
        margin: 20px 12px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="main-title">Pave the Way</h1>
    <h2 class="sub-title">🚛 Rock & Route</h2>
    <p class="tagline">Test your knowledge of aggregate delivery, timing, stockpiles, and material control.</p>

    <div id="quizSection" class="quiz-box">
      <div class="progress" id="progressText">Question 1 of 10</div>
      <div class="question-type" id="questionType">Multiple Choice</div>
      <div class="question" id="questionText"></div>
      <div class="answers" id="answersContainer"></div>
      <div class="feedback" id="feedbackText"></div>
      <div class="explanation" id="explanationText"></div>

      <div class="controls">
        <button class="control-btn next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next Question</button>
        <button class="control-btn restart-btn" onclick="startQuiz()">Restart Quiz</button>
        <a href="index.html"><button class="control-btn home-btn">Back to Home</button></a>
      </div>

      <div class="score-board" id="scoreBoard">Score: 0 / 0</div>
    </div>

    <div id="resultSection" class="quiz-box hidden">
      <div class="result-box">
        <h2>Quiz Complete</h2>
        <p id="finalScoreText"></p>
        <div class="controls" style="justify-content:center; margin-top: 20px;">
          <button class="control-btn restart-btn" onclick="startQuiz()">Play Again</button>
          <a href="index.html"><button class="control-btn home-btn">Back to Home</button></a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const allQuestions = [
      { type: "True / False", question: "Aggregate delivery affects production flow and jobsite efficiency.", options: ["True", "False"], answer: "True", explanation: "Poor delivery timing can disrupt production and site performance." },
      { type: "True / False", question: "Wrong aggregate delivery can affect plant operations and jobsite performance.", options: ["True", "False"], answer: "True", explanation: "Material issues upstream become production issues downstream." },
      { type: "True / False", question: "Delivery timing matters because some operations depend on a steady material supply.", options: ["True", "False"], answer: "True", explanation: "Interrupted supply can slow or stop production." },
      { type: "Multiple Choice", question: "What is one key goal of aggregate delivery?", options: ["A. Bring any material at any time", "B. Deliver the correct material in the correct amount at the correct time", "C. Keep trucks waiting longer", "D. Mix loads without checking"], answer: "B. Deliver the correct material in the correct amount at the correct time", explanation: "Delivery accuracy affects production and quality." },
      { type: "Multiple Choice", question: "What should be verified before unloading aggregate?", options: ["A. Driver playlist", "B. Material type and destination", "C. Office temperature", "D. Sign spacing"], answer: "B. Material type and destination", explanation: "Wrong material in the wrong place creates a mess fast." },
      { type: "Multiple Choice", question: "Why does contamination matter during aggregate delivery?", options: ["A. It makes unloading quieter", "B. It can hurt product quality and performance", "C. It changes the truck logo", "D. It reduces paperwork"], answer: "B. It can hurt product quality and performance", explanation: "Contaminated aggregate can create serious quality issues." },
      { type: "Multiple Choice", question: "Several loads arrive with different moisture conditions. What is the likely impact?", options: ["A. More uniform production", "B. Variable handling and possible mix inconsistency", "C. Cleaner storage areas", "D. Lower safety risk automatically"], answer: "B. Variable handling and possible mix inconsistency", explanation: "Moisture variation affects material behavior and consistency." },
      { type: "Multiple Choice", question: "A crew unloads the correct stone into the wrong stockpile. The biggest risk is:", options: ["A. Better blending", "B. Inventory confusion and material quality issues", "C. Lower fuel use", "D. Better weather"], answer: "B. Inventory confusion and material quality issues", explanation: "Wrong stockpile placement can create contamination and tracking problems." },
      { type: "Fill in the Blank", question: "Aggregate delivery problems can create delays and material ______.", options: ["shortages", "flowers", "permits", "paint"], answer: "shortages", explanation: "Bad timing or bad loads can leave a site or plant short on needed material." },
      { type: "Fill in the Blank", question: "Aggregate delivery is not just hauling; it also affects production ______.", options: ["control", "music", "uniforms", "advertising"], answer: "control", explanation: "Good delivery supports good process control." },
      { type: "Multiple Choice", question: "A plant experiences production inconsistency tied to incoming stone loads. What should be checked first?", options: ["A. Office chairs", "B. Material type, contamination, and moisture variation", "C. Social media scheduling", "D. Parking layout"], answer: "B. Material type, contamination, and moisture variation", explanation: "Inconsistent incoming material can ripple through the entire process." },
      { type: "Multiple Choice", question: "What is one key concern in aggregate delivery?", options: ["A. Decorative striping", "B. Correct material, timing, and unloading", "C. Bridge lighting", "D. Fence paint"], answer: "B. Correct material, timing, and unloading", explanation: "Delivery quality depends on getting the right material to the right place at the right time." }
    ];

    const totalQuestionsPerRound = 10;
    let selectedQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function shuffleArray(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function startQuiz() {
      selectedQuestions = shuffleArray(allQuestions).slice(0, totalQuestionsPerRound);
      currentQuestionIndex = 0;
      score = 0;
      answered = false;
      document.getElementById("quizSection").classList.remove("hidden");
      document.getElementById("resultSection").classList.add("hidden");
      showQuestion();
      updateScore();
    }

    function showQuestion() {
      answered = false;
      const q = selectedQuestions[currentQuestionIndex];
      document.getElementById("progressText").textContent = `Question ${currentQuestionIndex + 1} of ${selectedQuestions.length}`;
      document.getElementById("questionType").textContent = q.type;
      document.getElementById("questionText").textContent = q.question;
      document.getElementById("feedbackText").textContent = "";
      document.getElementById("explanationText").textContent = "";
      document.getElementById("nextBtn").disabled = true;

      const answersContainer = document.getElementById("answersContainer");
      answersContainer.innerHTML = "";
      q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = option;
        btn.onclick = () => selectAnswer(option, q.answer, q.explanation);
        answersContainer.appendChild(btn);
      });

      updateScore();
    }

    function selectAnswer(selected, correct, explanation) {
      if (answered) return;
      answered = true;
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === correct) btn.classList.add("correct");
        if (btn.textContent === selected && selected !== correct) btn.classList.add("wrong");
      });

      if (selected === correct) {
        score++;
        document.getElementById("feedbackText").textContent = "Correct";
        document.getElementById("feedbackText").style.color = "#15803d";
      } else {
        document.getElementById("feedbackText").textContent = "Incorrect";
        document.getElementById("feedbackText").style.color = "#b91c1c";
      }

      document.getElementById("explanationText").textContent = `Answer: ${correct}. ${explanation}`;
      document.getElementById("nextBtn").disabled = false;
      updateScore();
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < selectedQuestions.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function updateScore() {
      document.getElementById("scoreBoard").textContent = `Score: ${score} / ${currentQuestionIndex + (answered ? 1 : 0)}`;
    }

    function showResults() {
      document.getElementById("quizSection").classList.add("hidden");
      document.getElementById("resultSection").classList.remove("hidden");

      const percent = Math.round((score / selectedQuestions.length) * 100);
      let message = "";

      if (percent >= 90) {
        message = "Excellent work. You kept the rock on the right route.";
      } else if (percent >= 70) {
        message = "Nice job. Solid performance with only a few delivery bumps.";
      } else if (percent >= 50) {
        message = "Not bad, but some of those loads took a wrong turn.";
      } else {
        message = "Time for another round. Right now the material control is wandering off.";
      }

      document.getElementById("finalScoreText").textContent = `You scored ${score} out of ${selectedQuestions.length} (${percent}%). ${message}`;
    }

    startQuiz();
  </script>
</body>
</html>
