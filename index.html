<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pave the Way Safety Challenge</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #1f2933, #3b2f2f, #f59e0b);
      color: #ffffff;
      min-height: 100vh;
    }

    .app {
      width: min(1100px, 94%);
      margin: 0 auto;
      padding: 28px 0;
    }

    .hero {
      text-align: center;
      padding: 24px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.42);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 1px;
      color: #facc15;
      text-shadow: 2px 3px 0 #111827;
    }

    .hero p {
      margin: 10px auto 0;
      max-width: 760px;
      color: #fef3c7;
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .panel {
      margin-top: 22px;
      background: rgba(255, 255, 255, 0.95);
      color: #1f2937;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .setup-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    select, button {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 2px solid #d1d5db;
      font-size: 1rem;
    }

    button {
      cursor: pointer;
      font-weight: 800;
      border: none;
      background: #f59e0b;
      color: #111827;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    button.secondary {
      background: #111827;
      color: white;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: #111827;
      color: #fff;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.92rem;
    }

    .question-card {
      display: grid;
      grid-template-columns: minmax(260px, 42%) 1fr;
      gap: 20px;
      align-items: start;
    }

    .image-wrap {
      background: #111827;
      border-radius: 20px;
      overflow: hidden;
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #f59e0b;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      max-height: 390px;
      object-fit: cover;
      display: block;
    }

    .missing-image {
      padding: 20px;
      color: #fef3c7;
      text-align: center;
      line-height: 1.5;
      font-weight: 700;
    }

    .question-text {
      font-size: clamp(1.35rem, 3vw, 2rem);
      font-weight: 900;
      line-height: 1.2;
      margin: 0 0 14px;
      color: #111827;
    }

    .answers { display: grid; gap: 12px; }

    .answer-btn {
      background: #f3f4f6;
      color: #111827;
      text-align: left;
      border: 2px solid #d1d5db;
      font-weight: 800;
    }

    .answer-btn:hover { background: #fde68a; }

    .answer-btn.correct {
      background: #16a34a;
      color: white;
      border-color: #15803d;
    }

    .answer-btn.wrong {
      background: #dc2626;
      color: white;
      border-color: #991b1b;
    }

    .feedback {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      font-weight: 800;
      display: none;
    }

    .feedback.show { display: block; }
    .feedback.good { background: #dcfce7; color: #14532d; }
    .feedback.bad { background: #fee2e2; color: #7f1d1d; }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .controls button {
      flex: 1;
      min-width: 180px;
    }

    .hidden { display: none !important; }

    .results { text-align: center; }
    .results h2 { font-size: 2.2rem; margin-bottom: 8px; }

    .results .big-score {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      color: #f59e0b;
      text-shadow: 2px 2px 0 #111827;
      margin: 12px 0;
    }

    @media (max-width: 760px) {
      .question-card { grid-template-columns: 1fr; }
      .image-wrap { min-height: 210px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>🚧 Pave the Way 🚧</h1>
      <p>Asphalt and construction safety challenge. Pick a category, choose a difficulty, and prove you know how to stay out of the danger zone.</p>
    </section>

    <section id="setupPanel" class="panel">
      <h2>Start Game</h2>
      <div class="setup-grid">
        <div>
          <label for="categorySelect">Category</label>
          <select id="categorySelect"></select>
        </div>
        <div>
          <label for="difficultySelect">Difficulty</label>
          <select id="difficultySelect">
            <option value="All">All Difficulties</option>
            <option value="Beginner">Beginner</option>
            <option value="Advanced">Advanced</option>
            <option value="Expert">Expert</option>
          </select>
        </div>
        <div>
          <label for="questionCountSelect">Number of Questions</label>
          <select id="questionCountSelect">
            <option value="5">5 Questions</option>
            <option value="10">10 Questions</option>
            <option value="15">15 Questions</option>
            <option value="999">All Available</option>
          </select>
        </div>
      </div>
      <div class="controls">
        <button onclick="startGame()">Start Challenge</button>
      </div>
    </section>

    <section id="gamePanel" class="panel hidden">
      <div class="game-header">
        <span class="pill" id="progressPill">Question 1</span>
        <span class="pill" id="scorePill">Score: 0</span>
        <span class="pill" id="categoryPill">Category</span>
      </div>

      <div class="question-card">
        <div class="image-wrap" id="imageWrap"></div>
        <div>
          <p class="question-text" id="questionText"></p>
          <div class="answers" id="answers"></div>
          <div class="feedback" id="feedback"></div>
          <div class="controls">
            <button id="nextBtn" onclick="nextQuestion()" class="hidden">Next Question</button>
            <button onclick="restartGame()" class="secondary">Restart</button>
          </div>
        </div>
      </div>
    </section>

    <section id="resultsPanel" class="panel results hidden">
      <h2>Game Complete</h2>
      <p>You made it through the work zone without becoming a cautionary tale.</p>
      <div class="big-score" id="finalScore"></div>
      <p id="finalMessage"></p>
      <div class="controls">
        <button onclick="restartGame()">Play Again</button>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the biggest risk around a loader?", correct: "Being unseen by operator", wrong: ["Noise exposure", "Dust exposure", "Blinded by the light"], statement: "Get a load of this…make yourself be seen!", image: "loader-use" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is another common name for a skid steer?", correct: "Bobcat", wrong: ["Booty caller", "Skid Mark", "Watchdog"], statement: "Don't leave skid marks trying to get to the bobcat.", image: "bobcat" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the biggest risk around heavy equipment?", correct: "Being unseen by the operator", wrong: ["Noise exposure", "Dust exposure", "Material falling out"], statement: "Sometimes it's better to be seen than heard.", image: "heavy-equipment" },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What area around equipment is most dangerous?", correct: "Blind spots", wrong: ["Left side", "Right side", "Behind"], statement: "Always look around to see every angle, in the mirrors and with those 2 big eyeballs on your face.", image: "blind-spots" },
      { category: "EQUIPMENT", difficulty: "Expert", question: "What should you assume around any moving machine?", correct: "It may move unexpectedly", wrong: ["The driver may be an idiot", "Lights can blind you", "It will stop automatically to keep you safe"], statement: "If it moves, it can hit you - and it won't apologize.", image: "loader-use" },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is a loader primarily used for?", correct: "Moving material", wrong: ["Compaction", "Lifting personelle", "Pushing equipment"], statement: "Moving material…not testing how fast you can jump out of the way.", image: "loader" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is a roller used for?", correct: "Compaction", wrong: ["Moving Material", "Crushing pop cans", "Painting lines"], statement: "Flattening surfaces-and anything else that gets in its way.", image: "roller" },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is the safest distance from moving equipment?", correct: "Outside the operator’s blind spots", wrong: ["5 feet", "10 ft", "Depends on location"], statement: "Far enough that the operator needs binoculars to see you.", image: "moving-machine" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the biggest mistake workers make around equipment?", correct: "Assuming they are visible", wrong: ["Trusting coworkers", "Not wearing protective gear", "Not looking out in front while driving"], statement: "Thinking the operator sees them. Spoiler. They don't.", image: "equipment-use" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the safest way to approach equipment?", correct: "Make eye contact and stay clear", wrong: ["Don't do anything to make it mad", "Slowly with caution", "From the drivers side"], statement: "Make eye contact first—surprises are for birthdays, not job sites.", image: "moving-machine" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is a common nickname for a very old truck?", correct: "Beater", wrong: ["Squirt", "Oldie", "Howler"], statement: "Or old faithful… because it refuses to die.", image: "old-truck" },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What should you never do near moving equipment?", correct: "All of the above", wrong: ["Walk behind it without confirmation", "Taunt the driver", "Play hide and seek"], statement: "Never assume you’re faster than it—you’re not.", image: "safe-distance" },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is the biggest danger when equipment is backing up?", correct: "Limited visibility", wrong: ["Going deaf from the beeping", "Sharp stabbing things on the ground", "The driver"], statement: "Blind spots the size of your future plans.", image: "backing-up" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the safest assumption about operators?", correct: "They may not see you", wrong: ["They will hear you if you yell at them", "They always watch out for people", "They rely on the equipment to tell them of dangers"], statement: "Assume they don’t see you—because that’s how people stay alive.", image: "safe-mindset" },
      { category: "EQUIPMENT", difficulty: "Expert", question: "What causes most struck-by incidents?", correct: "Worker position and visibility", wrong: ["Drunk drivers", "Not paying attention", "Equipment malfunction"], statement: "Complacency—aka ‘I’ve done this a thousand times’ famous last words.", image: "never-do" },
      { category: "EQUIPMENT", difficulty: "Expert", question: "What is the danger of standing between machines?", correct: "Crush hazard", wrong: ["There is no danger if you stay alert", "You could slip on oil from above", "The only risk is noise exposure"], statement: "You become the filling in a very bad sandwich.", image: "operator-visibility" },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What does slow movement NOT remove?", correct: "Risk", wrong: ["Noise", "Operator control", "Fuel consumption"], statement: "Danger. Slow equipment can still ruin your day—just more gradually.", image: "blind-spots" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the purpose of backup alarms?", correct: "Alert nearby workers", wrong: ["Help guide the operator while reversing", "Warn the operator of obstacles", "Signal the equipment is low on battery or fuel"], statement: "To warn others—ignoring them is a personal choice… with consequences.", image: "backing-up" },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is a safe mindset near equipment?", correct: "Stay alert and expect movement", wrong: ["Always stay close to the equipment", "Leaving equipment running is better than turning off in between work", "Helmets save lives"], statement: "Keep your distance and stay alert but wear a helmet if you need that too.", image: "operator-visibility" },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is the danger of distractions near machines?", correct: "Reduced awareness", wrong: ["Slower reaction time", "Missed warning signals", "Delayed decision-making"], statement: "You didn’t lose skill—you lost attention. That’s all it takes", image: "equipment-use" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the safest action if unsure about equipment movement?", correct: "Stay clear", wrong: ["Move closer to get a better view", "Signal the operator immediately", "Continue working as normal"], statement: "Distance is the cheapest safety tool you’ve got", image: "visibility" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the risk of stepping into a travel path?", correct: "Being struck", wrong: ["Slipping on loose material", "Delaying operations", "Losing balance"], statement: "Equipment doesn’t swerve—it keeps going.", image: "worker-positioning" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is a loader bucket hazard?", correct: "Unexpected movement", wrong: ["Loud engine noise", "Limited fuel capacity", "Tire wear"], statement: "If it has hydraulics, it has surprises", image: "loader-use" },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What should you avoid near raised equipment?", correct: "Standing underneath", wrong: ["Walking behind it", "Touching the controls", "Standing to the side"], statement: "Gravity is undefeated", image: "loader-use" },
      { category: "EQUIPMENT", difficulty: "Expert", question: "What is the biggest risk near rotating parts?", correct: "Entanglement", wrong: ["Overheating", "Noise exposure", "Reduced visibility"], statement: "If it spins, it wins.", image: "blind-spots" },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is the safest position near equipment?", correct: "Visible and out of range", wrong: ["Directly behind the equipment", "Close to the operators side", "Anywhere on the job site"], statement: "Seen and safe beats close and sorry.", image: "traffic-control" },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "A machine stops suddenly and workers move closer out of curiosity. What is the risk?", correct: "Unexpected restart or hazard exposure", wrong: ["The machine running out of fuel", "Minor delays in work", "Loss of communication"], statement: "Stopped doesn’t mean safe—it means waiting.", image: "worker-positioning" },

      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "What is the main purpose of a work zone?", correct: "Protect workers from traffic", wrong: ["Increase equipment speed", "Store materials and tools", "Keep the site organized"], statement: "Conditions changes. Always reassess those situations.", image: "scenario-workzone" },
      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "Traffic begins moving faster than expected through your work zone. What is the best response?", correct: "Pause work and reassess traffic control", wrong: ["Continue working and stay alert", "Move workers farther from the lane and continue", "Wait to see if traffic settles down"], statement: "If conditions change, your plan is already outdated.", image: "worker-positioning" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What is the biggest traffic risk?", correct: "Driver error", wrong: ["Equipment failure", "Road conditions", "Weather changes"], statement: "The biggest hazard is the human behind the wheel.", image: "traffic-control" },
      { category: "TRAFFIC CONTROL", difficulty: "Expert", question: "What is a common protective vehicle called?", correct: "Crash truck", wrong: ["Lead vehicle", "Safety cart", "Traffic guide truck"], statement: "That truck takes the hit so you don’t.", image: "old-truck" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What should you always assume about drivers?", correct: "They may not follow instructions", wrong: ["They understand all signs", "They will slow down", "They see workers clearly"], statement: "Signs don’t guarantee behavior.", image: "work-zone" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What is the biggest danger in a work zone?", correct: "Traffic entering it", wrong: ["Workers falling asleep", "Immaturity", "Weather"], statement: "The danger isn’t outside the zone—it’s when it comes in.", image: "work-zone" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What is the purpose of cones?", correct: "Guide traffic", wrong: ["Stop vehicles completely", "Mark equipment locations", "Store materials"], statement: "You’re not stopping traffic—you’re steering it.", image: "traffic-control" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What is the purpose of signs?", correct: "Warn drivers", wrong: ["Control worker improvement", "Identify equipment", "Mark boundaries only"], statement: "A warning only works if someone pays attention.", image: "traffic-control" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What is the safest position near traffic?", correct: "Outside the travel lane", wrong: ["Near the center line", "Between lanes", "Close to moving vehicles"], statement: "If you’re in the lane, you’re in the game.", image: "worker-positioning" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What is a near miss with traffic?", correct: "A warning", wrong: ["A minor delay", "A traffic violation", "A routine event"], statement: "That was your free lesson—don’t wait for the paid one.", image: "never-do" },
      { category: "TRAFFIC CONTROL", difficulty: "Expert", question: "What should happen if traffic conditions change?", correct: "Reassess setup", wrong: ["Continue as planned", "Speed up work", "Reduce signage"], statement: "Yesterday’s plan doesn’t know today’s traffic.", image: "safe-mindset" },
      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "What is the risk of copying yesterday’s setup?", correct: "Conditions may differ", wrong: ["Slower setup time", "Extra materials used", "Increased cost"], statement: "Same road, different risks.", image: "instinct" },
      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "What is the danger of speeding traffic?", correct: "Reduced reaction time", wrong: ["Increased visibility", "Better flow of traffic", "Reduced congestion"], statement: "Speed steals decision time.", image: "operator-visibility" },
      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "What is a safe work zone mindset?", correct: "Expect mistakes", wrong: ["Assume everything goes as planned", "Focus only on your task", "Trust traffic patterns"], statement: "Plan for human error, not perfect behavior", image: "reassess-traffic" },
      { category: "TRAFFIC CONTROL", difficulty: "Expert", question: "What is the purpose of a buffer zone?", correct: "Provide protection space", wrong: ["Store equipment", "Increase work speed", "Separate workers from each other"], statement: "That space is there for when things go wrong.", image: "work-zone" },
      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "What is the biggest issue with distracted drivers?", correct: "Unpredictability", wrong: ["Slower speeds", "Better awareness", "Consistent behavior"], statement: "You can’t predict distracted—you prepare for it.", image: "unsafe-coworker" },
      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "What is the safest response to unsafe traffic flow?", correct: "Stop and adjust", wrong: ["Ignore and continue", "Move faster", "Reduce attention"], statement: "Stopping early beats reacting late.", image: "instinct" },
      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "What should workers always watch?", correct: "Traffic movement", wrong: ["Equipment color", "Work schedules", "Other workers only"], statement: "Watch the flow, not just your task.", image: "safe-distance" },
      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "What is a key traffic hazard?", correct: "Sudden lane changes", wrong: ["Smooth traffic flow", "Consistent speeds", "Clear weather"], statement: "Lanes shift faster than you think.", image: "work-zone" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What is the risk of poor visibility?", correct: "Late reaction", wrong: ["Faster decisions", "Better awareness", "Reduced congestion"], statement: "If they see you late, you’re already at risk.", image: "struck-by" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What is the safest approach to traffic?", correct: "Stay alert", wrong: ["Move quickly", "Focus on one direction", "Trust drivers"], statement: "Awareness is your early warning system.", image: "visibility" },
      { category: "TRAFFIC CONTROL", difficulty: "Expert", question: "What is the danger of complacency?", correct: "Reduced awareness", wrong: ["Increased focus", "Faster work pace", "Better coordination"], statement: "Comfort is where mistakes grow.", image: "safe-mindset" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What should you never assume?", correct: "Drivers see you", wrong: ["Equipment is loud", "Work is visible", "Signs are posted"], statement: "If you’re betting on being seen, you’re already losing.", image: "pause-and-verify" },
      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "What is a taper used for?", correct: "Guide traffic flow", wrong: ["Stop traffic", "Protect equipment", "Mark parking areas"], statement: "Smooth transitions prevent sudden decisions.", image: "traffic-control" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What is the biggest risk at night?", correct: "Reduced visibility", wrong: ["Increased traffic flow", "Cooler temperatures", "Less equipment use"], statement: "Darkness hides problems until it’s too late.", image: "unsafe-coworker" },
      { category: "TRAFFIC CONTROL", difficulty: "Beginner", question: "What is a key safety factor?", correct: "Positioning", wrong: ["Speed", "Strength", "Experience"], statement: "Where you stand decides how safe you are.", image: "worker-positioning" },
      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "Why is worker positioning important even when signs and cones are already in place?", correct: "Devices do not guarantee perfect driver behavior", wrong: ["To prevent accidents with the equipment", "To wave to the drivers and keep them in place", "To train the new workers"], statement: "Cones don’t control people—people ignore cones.", image: "worker-positioning" },
      { category: "TRAFFIC CONTROL", difficulty: "Advanced", question: "If traffic starts acting unpredictably near the work area, what should workers assume?", correct: "The work zone may need to be reassessed", wrong: ["It's best to shut down and wait for it to get better", "They should put signs out to slow traffic down", "They should put workers out to direct traffic better"], statement: "Address the situation and see what needs to be done.", image: "reassess-traffic" },

{ category: "PAVING", difficulty: "Beginner", question: "What is the biggest hazard near the paver?", correct: "Moving equipment", wrong: ["Hot surfaces", "Loose material", "Loud noise"], statement: "Big, slow, and still faster than you think.", image: "paver" },

{ category: "PAVING", difficulty: "Expert", question: "What is the hopper area risk?", correct: "Crush hazard", wrong: ["Heat exposure", "Dust buildup", "Slippery footing"], statement: "No space = no escape.", image: "hopper" },

{ category: "PAVING", difficulty: "Beginner", question: "What is a mat?", correct: "Asphalt surface", wrong: ["Base layer", "Equipment platform", "Storage area"], statement: "It’s the road you’re building—and it can still hurt you.", image: "screed-area" },

{ category: "PAVING", difficulty: "Beginner", question: "What is the risk of stepping on fresh asphalt?", correct: "Burns", wrong: ["Slipping", "Staining boots", "Uneven footing"], statement: "Fresh asphalt doesn’t look dangerous—it is.", image: "pavement" },

{ category: "PAVING", difficulty: "Beginner", question: "What is the biggest communication need?", correct: "Coordination", wrong: ["Speed", "Volume", "Frequence"], statement: "If you’re not aligned, you’re at risk.", image: "instinct" },

{ category: "ADVANCED SCENARIO QUESTIONS", difficulty: "Expert", question: "A work zone plan looks correct on paper but is confusing in the field. What matters more?", correct: "How the plan functions in real conditions", wrong: ["Plans are always correct", "It is just paperwork", "Only matters for new workers"], statement: "Conditions can always change so verify first.", image: "work-zone" },

{ category: "ADVANCED SCENARIO QUESTIONS", difficulty: "Expert", question: "Material is dumped into the wrong stockpile. What is the biggest risk?", correct: "Contamination and incorrect use later", wrong: ["Not fixing it fast enough", "Depends on materials", "Instantly ruined product"], statement: "One mistake now spreads into many later.", image: "stockpile" },
    ];    
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;

    function init() {
      populateCategories();
    }

    function populateCategories() {
      const categorySelect = document.getElementById("categorySelect");
      const categories = ["All Categories", ...new Set(questions.map(q => q.category))];
      categorySelect.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join("");
    }

    function startGame() {
      const selectedCategory = document.getElementById("categorySelect").value;
      const selectedDifficulty = document.getElementById("difficultySelect").value;
      const questionCount = Number(document.getElementById("questionCountSelect").value);

      const filtered = questions.filter(q => {
        const categoryMatch = selectedCategory === "All Categories" || q.category === selectedCategory;
        const difficultyMatch = selectedDifficulty === "All" || q.difficulty === selectedDifficulty;
        return categoryMatch && difficultyMatch;
      });

      if (filtered.length === 0) {
        alert("No questions match that setup. Try All Difficulties or All Categories.");
        return;
      }

      currentQuestions = shuffleArray(filtered).slice(0, questionCount);
      currentIndex = 0;
      score = 0;
      answered = false;

      document.getElementById("setupPanel").classList.add("hidden");
      document.getElementById("resultsPanel").classList.add("hidden");
      document.getElementById("gamePanel").classList.remove("hidden");

      showQuestion();
    }

    function showQuestion() {
      answered = false;
      const q = currentQuestions[currentIndex];

      document.getElementById("progressPill").textContent = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
      document.getElementById("scorePill").textContent = `Score: ${score}`;
      document.getElementById("categoryPill").textContent = `${q.category} • ${q.difficulty}`;
      document.getElementById("questionText").textContent = q.question;
      document.getElementById("imageWrap").innerHTML = `<img src="images/${cleanImageName(q.image)}.png" alt="${q.category} safety image" onerror="showMissingImage()" />`;

      const feedback = document.getElementById("feedback");
      feedback.className = "feedback";
      feedback.textContent = "";
      document.getElementById("nextBtn").classList.add("hidden");

      const answersDiv = document.getElementById("answers");
      answersDiv.innerHTML = "";

      buildAnswers(q).forEach(answer => {
        const button = document.createElement("button");
        button.className = "answer-btn";
        button.textContent = answer;
        button.onclick = () => selectAnswer(button, answer, q.correct);
        answersDiv.appendChild(button);
      });
    }

    function buildAnswers(q) {
      return shuffleArray([q.correct.trim(), ...q.wrong.map(answer => answer.trim()).filter(Boolean)]);
    }

    function selectAnswer(button, selected, correct) {
      if (answered) return;
      answered = true;
      const q = currentQuestions[currentIndex];
      const feedback = document.getElementById("feedback");

      document.querySelectorAll(".answer-btn").forEach(btn => {
        if (btn.textContent.trim() === correct.trim()) btn.classList.add("correct");
        btn.disabled = true;
      });

      if (selected.trim() === correct.trim()) {
        score++;
        document.getElementById("scorePill").textContent = `Score: ${score}`;
        button.classList.add("correct");
        feedback.className = "feedback show good";
        feedback.textContent = q.statement;
      } else {
        button.classList.add("wrong");
        feedback.className = "feedback show bad";
        feedback.textContent = `Not quite. Correct answer: ${correct}. ${q.statement}`;
      }

      document.getElementById("nextBtn").classList.remove("hidden");
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= currentQuestions.length) showResults();
      else showQuestion();
    }

    function showResults() {
      document.getElementById("gamePanel").classList.add("hidden");
      document.getElementById("resultsPanel").classList.remove("hidden");

      const percent = Math.round((score / currentQuestions.length) * 100);
      document.getElementById("finalScore").textContent = `${score}/${currentQuestions.length}`;

      let message = "";
      if (percent >= 90) message = "Excellent. You are work-zone ready.";
      else if (percent >= 70) message = "Good job. A few hazards still tried to sneak up on you.";
      else message = "Keep practicing. Construction safety is not the place for spicy guessing.";

      document.getElementById("finalMessage").textContent = `${percent}% — ${message}`;
    }

    function restartGame() {
      document.getElementById("gamePanel").classList.add("hidden");
      document.getElementById("resultsPanel").classList.add("hidden");
      document.getElementById("setupPanel").classList.remove("hidden");
    }

    function showMissingImage() {
      const q = currentQuestions[currentIndex];
      document.getElementById("imageWrap").innerHTML = `
        <div class="missing-image">
          Image not found:<br>
          <strong>images/${cleanImageName(q.image)}.png</strong><br><br>
          Check spelling, dashes, capitalization, and that the file is inside the images folder.
        </div>`;
    }

    function cleanImageName(name) {
      return String(name).trim().toLowerCase().replaceAll(" ", "-");
    }

    function shuffleArray(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    init();
  </script>
