<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pave the Way Safety Challenge</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #1f2933, #3b2f2f, #f59e0b);
      color: #ffffff;
      min-height: 100vh;
    }

    .app {
      width: min(1100px, 94%);
      margin: 0 auto;
      padding: 28px 0;
    }

    .hero {
      text-align: center;
      padding: 24px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.42);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 1px;
      color: #facc15;
      text-shadow: 2px 3px 0 #111827;
    }

    .hero p {
      margin: 10px auto 0;
      max-width: 760px;
      color: #fef3c7;
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .panel {
      margin-top: 22px;
      background: rgba(255, 255, 255, 0.95);
      color: #1f2937;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .setup-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    select, button {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 2px solid #d1d5db;
      font-size: 1rem;
    }

    button {
      cursor: pointer;
      font-weight: 800;
      border: none;
      background: #f59e0b;
      color: #111827;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    button.secondary {
      background: #111827;
      color: white;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: #111827;
      color: #fff;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.92rem;
    }

    .question-card {
      display: grid;
      grid-template-columns: minmax(260px, 42%) 1fr;
      gap: 20px;
      align-items: start;
    }

    .image-wrap {
      background: #111827;
      border-radius: 20px;
      overflow: hidden;
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #f59e0b;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      max-height: 390px;
      object-fit: cover;
      display: block;
    }

    .missing-image {
      padding: 20px;
      color: #fef3c7;
      text-align: center;
      line-height: 1.5;
      font-weight: 700;
    }

    .question-text {
      font-size: clamp(1.35rem, 3vw, 2rem);
      font-weight: 900;
      line-height: 1.2;
      margin: 0 0 14px;
      color: #111827;
    }

    .answers {
      display: grid;
      gap: 12px;
    }

    .answer-btn {
      background: #f3f4f6;
      color: #111827;
      text-align: left;
      border: 2px solid #d1d5db;
      font-weight: 800;
    }

    .answer-btn:hover {
      background: #fde68a;
    }

    .answer-btn.correct {
      background: #16a34a;
      color: white;
      border-color: #15803d;
    }

    .answer-btn.wrong {
      background: #dc2626;
      color: white;
      border-color: #991b1b;
    }

    .feedback {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      font-weight: 800;
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback.good {
      background: #dcfce7;
      color: #14532d;
    }

    .feedback.bad {
      background: #fee2e2;
      color: #7f1d1d;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .controls button {
      flex: 1;
      min-width: 180px;
    }

    .hidden {
      display: none !important;
    }

    .results {
      text-align: center;
    }

    .results h2 {
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .results .big-score {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      color: #f59e0b;
      text-shadow: 2px 2px 0 #111827;
      margin: 12px 0;
    }

    @media (max-width: 760px) {
      .question-card {
        grid-template-columns: 1fr;
      }

      .image-wrap {
        min-height: 210px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>🚧 Pave the Way 🚧</h1>
      <p>Asphalt and construction safety challenge. Pick a category, choose a difficulty, and prove you know how to stay out of the danger zone.</p>
    </section>

    <section id="setupPanel" class="panel">
      <h2>Start Game</h2>
      <div class="setup-grid">
        <div>
          <label for="categorySelect">Category</label>
          <select id="categorySelect"></select>
        </div>
        <div>
          <label for="difficultySelect">Difficulty</label>
          <select id="difficultySelect">
            <option value="All">All Difficulties</option>
            <option value="Beginner">Beginner</option>
            <option value="Advanced">Advanced</option>
            <option value="Expert">Expert</option>
          </select>
        </div>
        <div>
          <label for="questionCountSelect">Number of Questions</label>
          <select id="questionCountSelect">
            <option value="5">5 Questions</option>
            <option value="10">10 Questions</option>
            <option value="15">15 Questions</option>
            <option value="999">All Available</option>
          </select>
        </div>
      </div>
      <div class="controls">
        <button onclick="startGame()">Start Challenge</button>
      </div>
    </section>

    <section id="gamePanel" class="panel hidden">
      <div class="game-header">
        <span class="pill" id="progressPill">Question 1 of 10</span>
        <span class="pill" id="scorePill">Score: 0</span>
        <span class="pill" id="categoryPill">Equipment</span>
      </div>

      <div class="question-card">
        <div class="image-wrap" id="imageWrap">
          <img id="questionImage" src="" alt="Question image" onerror="showMissingImage()" />
        </div>

        <div>
          <p class="question-text" id="questionText"></p>
          <div class="answers" id="answers"></div>
          <div class="feedback" id="feedback"></div>
          <div class="controls">
            <button id="nextBtn" onclick="nextQuestion()" class="hidden">Next Question</button>
            <button onclick="restartGame()" class="secondary">Restart</button>
          </div>
        </div>
      </div>
    </section>

    <section id="resultsPanel" class="panel results hidden">
      <h2>Game Complete</h2>
      <p>You made it through the work zone without becoming a cautionary tale.</p>
      <div class="big-score" id="finalScore"></div>
      <p id="finalMessage"></p>
      <div class="controls">
        <button onclick="restartGame()">Play Again</button>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the biggest risk around a loader?", correct: "Being unseen by operator", image: "loader-use", fact: "Operators have limited visibility—if they can't see you, you are in danger." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is another common name for a skid steer?", correct: "Bobcat", image: "bobcat", fact: "Skid steers are commonly called Bobcats, regardless of brand." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the biggest risk around heavy equipment?", correct: "Being unseen by the operator", image: "heavy-equipment", fact: "Most struck-by incidents happen because workers are not visible." },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What area around equipment is most dangerous?", correct: "Blind spots", image: "blind-spots", fact: "Blind spots exist on all heavy equipment—never assume visibility." },
      { category: "EQUIPMENT", difficulty: "Expert", question: "What should you assume around any moving machine?", correct: "It may move unexpectedly", image: "loader-use", fact: "Machines can move suddenly—always expect unexpected motion." },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is a loader primarily used for?", correct: "Moving material", image: "loader", fact: "Loaders are designed to move material quickly, often with limited visibility." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is a roller used for?", correct: "Compaction", image: "roller", fact: "Rollers compact asphalt and soil to create stable surfaces." },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is the safest distance from moving equipment?", correct: "Outside the operator’s blind spots", image: "moving-machine", fact: "Staying outside blind spots keeps you visible and safer." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the biggest mistake workers make around equipment?", correct: "Assuming they are visible", image: "equipment-use", fact: "Never assume an operator sees you—visibility must be confirmed." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the safest way to approach equipment?", correct: "Make eye contact and stay clear", image: "moving-machine", fact: "Eye contact confirms the operator sees you before approaching." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is a common nickname for a very old truck?", correct: "Beater", image: "old-truck", fact: "Old trucks may have mechanical issues—always inspect before use." },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What should you never do near moving equipment?", correct: "All of the above", image: "safe-distance", fact: "Unsafe behaviors around equipment quickly lead to serious incidents." },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is the biggest danger when equipment is backing up?", correct: "Limited visibility", image: "backing-up", fact: "Operators have very limited rear visibility when backing up." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the safest assumption about operators?", correct: "They may not see you", image: "safe-mindset", fact: "Always assume the operator cannot see you unless confirmed." },
      { category: "EQUIPMENT", difficulty: "Expert", question: "What causes most struck-by incidents?", correct: "Worker position and visibility", image: "never-do", fact: "Positioning and visibility are the leading causes of struck-by accidents." },
      { category: "EQUIPMENT", difficulty: "Expert", question: "What is the danger of standing between machines?", correct: "Crush hazard", image: "operator-visibility", fact: "Standing between machines can result in deadly crush injuries." },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What does slow movement NOT remove?", correct: "Risk", image: "blind-spots", fact: "Even slow-moving equipment can cause serious injuries." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the purpose of backup alarms?", correct: "Alert nearby workers", image: "backing-up", fact: "Backup alarms warn workers of reversing equipment." },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is a safe mindset near equipment?", correct: "Stay alert and expect movement", image: "operator-visibility", fact: "Staying alert helps you react quickly to hazards." },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is the danger of distractions near machines?", correct: "Reduced awareness", image: "equipment-use", fact: "Distractions reduce awareness and increase accident risk." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the safest action if unsure about equipment movement?", correct: "Stay clear", image: "visibility", fact: "When unsure, distance is your best protection." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is the risk of stepping into a travel path?", correct: "Being struck", image: "worker-positioning", fact: "Travel paths are active danger zones—never step into them." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What is a loader bucket hazard?", correct: "Unexpected movement", image: "loader-use", fact: "Buckets can drop or move unexpectedly without warning." },
      { category: "EQUIPMENT", difficulty: "Beginner", question: "What should you avoid near raised equipment?", correct: "Standing underneath", image: "loader-use", fact: "Never stand under raised equipment—it can fail suddenly." },
      { category: "EQUIPMENT", difficulty: "Expert", question: "What is the biggest risk near rotating parts?", correct: "Entanglement", image: "blind-spots", fact: "Rotating parts can pull in clothing or body parts quickly." },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "What is the safest position near equipment?", correct: "Visible and out of range", image: "traffic-control", fact: "Stay visible and out of the machine’s operating range." },
      { category: "EQUIPMENT", difficulty: "Advanced", question: "A machine stops suddenly and workers move closer out of curiosity. What is the risk?", correct: "Unexpected restart or hazard exposure", image: "worker-positioning", fact: "Machines can restart suddenly—never assume it's safe just because it stopped." }
    ];

    const wrongAnswerBank = [
      "Texting while standing closer",
      "Standing in the blind spot",
      "Assuming the operator sees you",
      "Walking behind equipment",
      "Standing underneath raised equipment",
      "Moving closer to get a better look",
      "Ignoring backup alarms",
      "Crossing through the travel path",
      "Relying only on hearing the machine",
      "Turning your back on moving equipment",
      "Standing between machines",
      "Waiting where the operator cannot see you",
      "Using cones as a chair",
      "Waving once and hoping for the best",
      "Getting just close enough to make safety nervous"
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;

    function init() {
      populateCategories();
    }

    function populateCategories() {
      const categorySelect = document.getElementById("categorySelect");
      const categories = ["All Categories", ...new Set(questions.map(q => q.category))];
      categorySelect.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join("");
    }

    function startGame() {
      const selectedCategory = document.getElementById("categorySelect").value;
      const selectedDifficulty = document.getElementById("difficultySelect").value;
      const questionCount = Number(document.getElementById("questionCountSelect").value);

      let filtered = questions.filter(q => {
        const categoryMatch = selectedCategory === "All Categories" || q.category === selectedCategory;
        const difficultyMatch = selectedDifficulty === "All" || q.difficulty === selectedDifficulty;
        return categoryMatch && difficultyMatch;
      });

      if (filtered.length === 0) {
        alert("No questions match that setup. Try All Difficulties or All Categories.");
        return;
      }

      currentQuestions = shuffleArray(filtered).slice(0, questionCount);
      currentIndex = 0;
      score = 0;
      answered = false;

      document.getElementById("setupPanel").classList.add("hidden");
      document.getElementById("resultsPanel").classList.add("hidden");
      document.getElementById("gamePanel").classList.remove("hidden");

      showQuestion();
    }

    function showQuestion() {
      answered = false;
      const q = currentQuestions[currentIndex];

      document.getElementById("progressPill").textContent = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
      document.getElementById("scorePill").textContent = `Score: ${score}`;
      document.getElementById("categoryPill").textContent = `${q.category} • ${q.difficulty}`;
      document.getElementById("questionText").textContent = q.question;

      const image = document.getElementById("questionImage");
      const imageWrap = document.getElementById("imageWrap");
      imageWrap.innerHTML = `<img id="questionImage" src="images/${q.image}.png" alt="${q.category} safety image" onerror="showMissingImage()" />`;

      const feedback = document.getElementById("feedback");
      feedback.className = "feedback";
      feedback.textContent = "";

      document.getElementById("nextBtn").classList.add("hidden");

      const answers = buildAnswers(q.correct);
      const answersDiv = document.getElementById("answers");
      answersDiv.innerHTML = answers.map(answer => `
        <button class="answer-btn" onclick="selectAnswer(this, '${escapeForClick(answer)}', '${escapeForClick(q.correct)}')">${answer}</button>
      `).join("");
    }

    function buildAnswers(correctAnswer) {
      const cleanCorrect = correctAnswer.trim();
      const wrongs = wrongAnswerBank
        .filter(w => w.toLowerCase() !== cleanCorrect.toLowerCase())
        .sort(() => Math.random() - 0.5)
        .slice(0, 3);

      return shuffleArray([cleanCorrect, ...wrongs]);
    }

    function selectAnswer(button, selected, correct) {
      if (answered) return;
      answered = true;

      const allButtons = document.querySelectorAll(".answer-btn");
      const feedback = document.getElementById("feedback");

      allButtons.forEach(btn => {
        if (btn.textContent.trim() === correct.trim()) {
          btn.classList.add("correct");
        }
        btn.disabled = true;
      });

      if (selected.trim() === correct.trim()) {
        score++;
        document.getElementById("scorePill").textContent = `Score: ${score}`;
        button.classList.add("correct");
        feedback.className = "feedback show good";
        feedback.textContent = currentQuestions[currentIndex].fact;
      } else {
        button.classList.add("wrong");
        feedback.className = "feedback show bad";
        feedback.textContent = `Not quite. ${currentQuestions[currentIndex].fact}`;
      }

      document.getElementById("nextBtn").classList.remove("hidden");
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= currentQuestions.length) {
        showResults();
      } else {
        showQuestion();
      }
    }

    function showResults() {
      document.getElementById("gamePanel").classList.add("hidden");
      document.getElementById("resultsPanel").classList.remove("hidden");

      const percent = Math.round((score / currentQuestions.length) * 100);
      document.getElementById("finalScore").textContent = `${score}/${currentQuestions.length}`;

      let message = "";
      if (percent >= 90) message = "Excellent. You are work-zone ready.";
      else if (percent >= 70) message = "Good job. A few hazards still tried to sneak up on you.";
      else message = "Keep practicing. Construction safety is not the place for spicy guessing.";

      document.getElementById("finalMessage").textContent = `${percent}% — ${message}`;
    }

    function restartGame() {
      document.getElementById("gamePanel").classList.add("hidden");
      document.getElementById("resultsPanel").classList.add("hidden");
      document.getElementById("setupPanel").classList.remove("hidden");
    }

    function showMissingImage() {
      const q = currentQuestions[currentIndex];
      document.getElementById("imageWrap").innerHTML = `
        <div class="missing-image">
          Image not found:<br>
          <strong>images/${q.image}.png</strong><br><br>
          Check spelling, dashes, capitalization, and that the file is inside the images folder.
        </div>
      `;
    }

    function shuffleArray(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function escapeForClick(text) {
      return text.replace(/'/g, "&#39;").replace(/"/g, "&quot;");
    }

    function randomGoodFeedback() {
      const messages = [
        "Correct. Nobody became pavement today.",
        "Nice work. Safety brain activated.",
        "Correct. The cones are proud of you.",
        "Yes. That answer has its hard hat on.",
        "Correct. You avoided the danger zone like a professional."
      ];
      return messages[Math.floor(Math.random() * messages.length)];
    }

    init();
  </script>
</body>
</html>
