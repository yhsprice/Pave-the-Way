<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pave the Way | Safety Zone</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f4f4f4, #e7ecef);
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      padding: 30px;
    }

    .main-title {
      text-align: center;
      font-size: 42px;
      margin-bottom: 8px;
      color: #1d3557;
    }

    .sub-title {
      text-align: center;
      font-size: 28px;
      margin-top: 0;
      margin-bottom: 10px;
      color: #444;
    }

    .tagline {
      text-align: center;
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
    }

    .quiz-box {
      background: #f8fafc;
      border: 2px solid #d9e2ec;
      border-radius: 16px;
      padding: 25px;
    }

    .progress {
      font-size: 15px;
      font-weight: bold;
      color: #555;
      margin-bottom: 12px;
    }

    .question-type {
      display: inline-block;
      background: #dbeafe;
      color: #1e3a8a;
      font-size: 13px;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 15px;
    }

    .question {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .answers {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .answer-btn {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      background: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .answer-btn:hover {
      background: #eef6ff;
      border-color: #93c5fd;
    }

    .answer-btn.correct {
      background: #dcfce7;
      border-color: #22c55e;
      font-weight: bold;
    }

    .answer-btn.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      font-weight: bold;
    }

    .answer-btn:disabled {
      cursor: default;
    }

    .feedback {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 10px;
      min-height: 24px;
    }

    .explanation {
      font-size: 15px;
      color: #555;
      margin-bottom: 20px;
      min-height: 40px;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .control-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .next-btn {
      background: #1d4ed8;
      color: white;
    }

    .next-btn:hover {
      background: #1e40af;
    }

    .restart-btn {
      background: #64748b;
      color: white;
    }

    .restart-btn:hover {
      background: #475569;
    }

    .home-btn {
      background: #0f766e;
      color: white;
    }

    .home-btn:hover {
      background: #115e59;
    }

    .score-board {
      margin-top: 20px;
      font-size: 17px;
      font-weight: bold;
      color: #1f2937;
    }

    .hidden {
      display: none;
    }

    .result-box {
      text-align: center;
      padding: 20px 10px;
    }

    .result-box h2 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #1d3557;
    }

    .result-box p {
      font-size: 20px;
      color: #444;
      line-height: 1.5;
    }

    @media (max-width: 700px) {
      .main-title {
        font-size: 34px;
      }

      .sub-title {
        font-size: 24px;
      }

      .question {
        font-size: 20px;
      }

      .container {
        margin: 20px 12px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="main-title">Pave the Way</h1>
    <h2 class="sub-title">⚠️ Safety Zone</h2>
    <p class="tagline">Test your knowledge of site safety, trench hazards, spotting, and equipment awareness.</p>

    <div id="quizSection" class="quiz-box">
      <div class="progress" id="progressText">Question 1 of 10</div>
      <div class="question-type" id="questionType">Multiple Choice</div>
      <div class="question" id="questionText"></div>
      <div class="answers" id="answersContainer"></div>
      <div class="feedback" id="feedbackText"></div>
      <div class="explanation" id="explanationText"></div>

      <div class="controls">
        <button class="control-btn next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next Question</button>
        <button class="control-btn restart-btn" onclick="startQuiz()">Restart Quiz</button>
        <a href="index.html"><button class="control-btn home-btn">Back to Home</button></a>
      </div>

      <div class="score-board" id="scoreBoard">Score: 0 / 0</div>
    </div>

    <div id="resultSection" class="quiz-box hidden">
      <div class="result-box">
        <h2>Quiz Complete</h2>
        <p id="finalScoreText"></p>
        <div class="controls" style="justify-content:center; margin-top: 20px;">
          <button class="control-btn restart-btn" onclick="startQuiz()">Play Again</button>
          <a href="index.html"><button class="control-btn home-btn">Back to Home</button></a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const allQuestions = [
      {
        type: "True / False",
        question: "PPE requirements can vary depending on the task and jobsite hazards.",
        options: ["True", "False"],
        answer: "True",
        explanation: "Different tasks and site hazards may require different protective equipment."
      },
      {
        type: "True / False",
        question: "A trench is safe to enter as long as the job will only take a minute.",
        options: ["True", "False"],
        answer: "False",
        explanation: "Unsafe is unsafe, even for a short task. Trenches can collapse without warning."
      },
      {
        type: "True / False",
        question: "Spotters help reduce the risk of struck-by incidents around heavy equipment.",
        options: ["True", "False"],
        answer: "True",
        explanation: "Spotters improve communication and help operators move equipment more safely."
      },
      {
        type: "True / False",
        question: "Utility locates should be verified before digging begins.",
        options: ["True", "False"],
        answer: "True",
        explanation: "Locates help prevent utility strikes, damage, and injuries."
      },
      {
        type: "True / False",
        question: "Blind spots around heavy equipment are a serious hazard.",
        options: ["True", "False"],
        answer: "True",
        explanation: "Operators cannot always see workers nearby, especially in blind spots."
      },
      {
        type: "Multiple Choice",
        question: "Why is a spotter used around heavy equipment?",
        options: [
          "A. To make the site louder",
          "B. To help communicate movement safely",
          "C. To measure asphalt temperature",
          "D. To reduce paperwork"
        ],
        answer: "B. To help communicate movement safely",
        explanation: "Spotters help guide equipment movement and reduce risk."
      },
      {
        type: "Multiple Choice",
        question: "What is one major hazard of trench work?",
        options: [
          "A. Paint overspray",
          "B. Trench collapse",
          "C. Wet concrete color",
          "D. Gravel noise"
        ],
        answer: "B. Trench collapse",
        explanation: "Trench collapse is one of the most serious and deadly excavation hazards."
      },
      {
        type: "Multiple Choice",
        question: "What is the best reason to establish clear equipment travel paths on a site?",
        options: [
          "A. Better tire shine",
          "B. Reduce confusion and struck-by risk",
          "C. Keep workers guessing",
          "D. Improve sign colors"
        ],
        answer: "B. Reduce confusion and struck-by risk",
        explanation: "Defined travel paths improve site safety and reduce conflicts."
      },
      {
        type: "Multiple Choice",
        question: "Before digging, crews should verify underground utility:",
        options: [
          "A. Recipes",
          "B. Locates",
          "C. Colors",
          "D. Budgets"
        ],
        answer: "B. Locates",
        explanation: "Underground utility locates help prevent damage and injury."
      },
      {
        type: "Multiple Choice",
        question: "Which of the following is the best response to an unprotected trench entry?",
        options: [
          "A. Allow it if someone watches",
          "B. Stop the work and require proper trench protection",
          "C. Let the worker decide",
          "D. Ignore it if it is a fast task"
        ],
        answer: "B. Stop the work and require proper trench protection",
        explanation: "Unprotected trench entry is a serious hazard and should be stopped."
      },
      {
        type: "Fill in the Blank",
        question: "Before excavation begins, crews should verify utility ______.",
        options: ["locates", "weather", "logos", "uniforms"],
        answer: "locates",
        explanation: "Utility locates are critical before digging."
      },
      {
        type: "Fill in the Blank",
        question: "A trench box helps ______ workers in a trench.",
        options: ["protect", "confuse", "hide", "delay"],
        answer: "protect",
        explanation: "A trench box helps protect workers from cave-ins."
      },
      {
        type: "Fill in the Blank",
        question: "Blind spots around heavy equipment increase ______ risk.",
        options: ["struck-by", "weather", "paperwork", "paint"],
        answer: "struck-by",
        explanation: "Workers in blind spots are at greater risk of being struck."
      },
      {
        type: "Multiple Choice",
        question: "Why does PPE matter on a construction site?",
        options: [
          "A. It improves paving speed",
          "B. It helps protect workers from site hazards",
          "C. It reduces truck fuel use",
          "D. It changes the weather"
        ],
        answer: "B. It helps protect workers from site hazards",
        explanation: "PPE is used to reduce exposure to hazards."
      },
      {
        type: "Multiple Choice",
        question: "What is one major reason communication matters around moving equipment?",
        options: [
          "A. It reduces paperwork",
          "B. It helps prevent misunderstandings and injuries",
          "C. It makes the site louder",
          "D. It improves paint striping"
        ],
        answer: "B. It helps prevent misunderstandings and injuries",
        explanation: "Clear communication reduces errors and safety risks."
      }
    ];

    const totalQuestionsPerRound = 10;
    let selectedQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function shuffleArray(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function startQuiz() {
      selectedQuestions = shuffleArray(allQuestions).slice(0, totalQuestionsPerRound);
      currentQuestionIndex = 0;
      score = 0;
      answered = false;

      document.getElementById("quizSection").classList.remove("hidden");
      document.getElementById("resultSection").classList.add("hidden");

      showQuestion();
      updateScore();
    }

    function showQuestion() {
      answered = false;
      const q = selectedQuestions[currentQuestionIndex];

      document.getElementById("progressText").textContent =
        `Question ${currentQuestionIndex + 1} of ${selectedQuestions.length}`;
      document.getElementById("questionType").textContent = q.type;
      document.getElementById("questionText").textContent = q.question;
      document.getElementById("feedbackText").textContent = "";
      document.getElementById("explanationText").textContent = "";
      document.getElementById("nextBtn").disabled = true;

      const answersContainer = document.getElementById("answersContainer");
      answersContainer.innerHTML = "";

      q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = option;
        btn.onclick = () => selectAnswer(option, q.answer, q.explanation);
        answersContainer.appendChild(btn);
      });

      updateScore();
    }

    function selectAnswer(selected, correct, explanation) {
      if (answered) return;
      answered = true;

      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => {
        btn.disabled = true;

        if (btn.textContent === correct) {
          btn.classList.add("correct");
        }

        if (btn.textContent === selected && selected !== correct) {
          btn.classList.add("wrong");
        }
      });

      if (selected === correct) {
        score++;
        document.getElementById("feedbackText").textContent = "Correct";
        document.getElementById("feedbackText").style.color = "#15803d";
      } else {
        document.getElementById("feedbackText").textContent = "Incorrect";
        document.getElementById("feedbackText").style.color = "#b91c1c";
      }

      document.getElementById("explanationText").textContent = `Answer: ${correct}. ${explanation}`;
      document.getElementById("nextBtn").disabled = false;

      updateScore();
    }

    function nextQuestion() {
      currentQuestionIndex++;

      if (currentQuestionIndex < selectedQuestions.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function updateScore() {
      document.getElementById("scoreBoard").textContent =
        `Score: ${score} / ${currentQuestionIndex + (answered ? 1 : 0)}`;
    }

    function showResults() {
      document.getElementById("quizSection").classList.add("hidden");
      document.getElementById("resultSection").classList.remove("hidden");

      const percent = Math.round((score / selectedQuestions.length) * 100);
      let message = "";

      if (percent >= 90) {
        message = "Excellent work. You clearly prefer safety over chaos.";
      } else if (percent >= 70) {
        message = "Nice job. Solid awareness with only a few rough edges.";
      } else if (percent >= 50) {
        message = "Not bad, but there are still a few hazards hiding in your answers.";
      } else {
        message = "Time for another round. The safest guess is to study more.";
      }

      document.getElementById("finalScoreText").textContent =
        `You scored ${score} out of ${selectedQuestions.length} (${percent}%). ${message}`;
    }

    startQuiz();
  </script>
</body>
</html>
