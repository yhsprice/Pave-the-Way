<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pave the Way | On Track</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f4f4f4, #e7ecef);
      color: #222;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      padding: 30px;
    }
    .main-title {
      text-align: center;
      font-size: 42px;
      margin-bottom: 8px;
      color: #1d3557;
    }
    .sub-title {
      text-align: center;
      font-size: 28px;
      margin-top: 0;
      margin-bottom: 10px;
      color: #444;
    }
    .tagline {
      text-align: center;
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
    }
    .quiz-box {
      background: #f8fafc;
      border: 2px solid #d9e2ec;
      border-radius: 16px;
      padding: 25px;
    }
    .progress {
      font-size: 15px;
      font-weight: bold;
      color: #555;
      margin-bottom: 12px;
    }
    .question-type {
      display: inline-block;
      background: #dbeafe;
      color: #1e3a8a;
      font-size: 13px;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 15px;
    }
    .question {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .answers {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }
    .answer-btn {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      background: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .answer-btn:hover {
      background: #eef6ff;
      border-color: #93c5fd;
    }
    .answer-btn.correct {
      background: #dcfce7;
      border-color: #22c55e;
      font-weight: bold;
    }
    .answer-btn.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      font-weight: bold;
    }
    .answer-btn:disabled { cursor: default; }
    .feedback {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 10px;
      min-height: 24px;
    }
    .explanation {
      font-size: 15px;
      color: #555;
      margin-bottom: 20px;
      min-height: 40px;
      line-height: 1.5;
    }
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .control-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .next-btn { background: #1d4ed8; color: white; }
    .next-btn:hover { background: #1e40af; }
    .restart-btn { background: #64748b; color: white; }
    .restart-btn:hover { background: #475569; }
    .home-btn { background: #0f766e; color: white; }
    .home-btn:hover { background: #115e59; }
    .score-board {
      margin-top: 20px;
      font-size: 17px;
      font-weight: bold;
      color: #1f2937;
    }
    .hidden { display: none; }
    .result-box {
      text-align: center;
      padding: 20px 10px;
    }
    .result-box h2 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #1d3557;
    }
    .result-box p {
      font-size: 20px;
      color: #444;
      line-height: 1.5;
    }
    @media (max-width: 700px) {
      .main-title { font-size: 34px; }
      .sub-title { font-size: 24px; }
      .question { font-size: 20px; }
      .container {
        margin: 20px 12px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="main-title">Pave the Way</h1>
    <h2 class="sub-title">🚆 On Track</h2>
    <p class="tagline">Test your knowledge of rail transloading, transfer handling, tracking, and process control.</p>

    <div id="quizSection" class="quiz-box">
      <div class="progress" id="progressText">Question 1 of 10</div>
      <div class="question-type" id="questionType">Multiple Choice</div>
      <div class="question" id="questionText"></div>
      <div class="answers" id="answersContainer"></div>
      <div class="feedback" id="feedbackText"></div>
      <div class="explanation" id="explanationText"></div>

      <div class="controls">
        <button class="control-btn next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next Question</button>
        <button class="control-btn restart-btn" onclick="startQuiz()">Restart Quiz</button>
        <a href="index.html"><button class="control-btn home-btn">Back to Home</button></a>
      </div>

      <div class="score-board" id="scoreBoard">Score: 0 / 0</div>
    </div>

    <div id="resultSection" class="quiz-box hidden">
      <div class="result-box">
        <h2>Quiz Complete</h2>
        <p id="finalScoreText"></p>
        <div class="controls" style="justify-content:center; margin-top: 20px;">
          <button class="control-btn restart-btn" onclick="startQuiz()">Play Again</button>
          <a href="index.html"><button class="control-btn home-btn">Back to Home</button></a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const allQuestions = [
      { type: "True / False", question: "Rail transloading involves moving materials between rail and another transport or storage system.", options: ["True", "False"], answer: "True", explanation: "That is exactly what rail transloading is." },
      { type: "True / False", question: "Rail transloading depends on proper handling and coordination.", options: ["True", "False"], answer: "True", explanation: "Bad coordination causes delays and handling problems." },
      { type: "True / False", question: "Correct handling during transfer matters because material can be lost or contaminated.", options: ["True", "False"], answer: "True", explanation: "Transfer points are where mistakes love to happen." },
      { type: "Multiple Choice", question: "What is rail transloading?", options: ["A. Painting railcars", "B. Moving material between rail and another transport or storage system", "C. Building railroad signs", "D. Replacing tracks"], answer: "B. Moving material between rail and another transport or storage system", explanation: "That is the basic function of rail transloading." },
      { type: "Multiple Choice", question: "Why is product tracking important in rail transloading?", options: ["A. It only matters for billing", "B. It helps prevent errors, delays, and material confusion", "C. It slows unloading", "D. It makes storage harder"], answer: "B. It helps prevent errors, delays, and material confusion", explanation: "Tracking supports control and accountability." },
      { type: "Multiple Choice", question: "What is one likely outcome of poor coordination in rail transloading?", options: ["A. Smoother transfers", "B. Delays and handling mistakes", "C. Better stockpile accuracy", "D. Lower equipment needs"], answer: "B. Delays and handling mistakes", explanation: "Poor coordination usually shows up as wasted time and bad transfers." },
      { type: "Multiple Choice", question: "A transloading site keeps having product discrepancies after transfers. What should be checked first?", options: ["A. Office paint color", "B. Transfer process, tracking, and handling controls", "C. Parking lot striping", "D. Fence height"], answer: "B. Transfer process, tracking, and handling controls", explanation: "Discrepancies usually point to poor process control or tracking." },
      { type: "Multiple Choice", question: "Why is consistency important in rail transloading procedures?", options: ["A. It helps reduce error and improve control", "B. It removes the need for communication", "C. It makes materials cheaper", "D. It changes rail schedules"], answer: "A. It helps reduce error and improve control", explanation: "Consistency is how you stop repeat mistakes." },
      { type: "Fill in the Blank", question: "Transloading means moving material from one system to ______.", options: ["another", "paint", "concrete", "gravel"], answer: "another", explanation: "That transfer is the whole point." },
      { type: "Fill in the Blank", question: "Rail transloading depends on safe handling, coordination, and process ______.", options: ["control", "advertising", "lighting", "landscaping"], answer: "control", explanation: "Without process control, things go sideways fast." },
      { type: "Multiple Choice", question: "If transloaded material is mishandled during transfer, the main risk is:", options: ["A. Better site branding", "B. Product loss, contamination, delays, or safety issues", "C. Reduced paperwork", "D. Improved weather"], answer: "B. Product loss, contamination, delays, or safety issues", explanation: "Material handling errors in transloading can create costly problems." },
      { type: "Multiple Choice", question: "What is one major concern in rail transloading?", options: ["A. Correct transfer handling and coordination", "B. Grass height", "C. Office lighting", "D. Fence shape"], answer: "A. Correct transfer handling and coordination", explanation: "Rail transloading depends on controlled handling and logistics." }
    ];

    const totalQuestionsPerRound = 10;
    let selectedQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function shuffleArray(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function startQuiz() {
      selectedQuestions = shuffleArray(allQuestions).slice(0, totalQuestionsPerRound);
      currentQuestionIndex = 0;
      score = 0;
      answered = false;
      document.getElementById("quizSection").classList.remove("hidden");
      document.getElementById("resultSection").classList.add("hidden");
      showQuestion();
      updateScore();
    }

    function showQuestion() {
      answered = false;
      const q = selectedQuestions[currentQuestionIndex];
      document.getElementById("progressText").textContent = `Question ${currentQuestionIndex + 1} of ${selectedQuestions.length}`;
      document.getElementById("questionType").textContent = q.type;
      document.getElementById("questionText").textContent = q.question;
      document.getElementById("feedbackText").textContent = "";
      document.getElementById("explanationText").textContent = "";
      document.getElementById("nextBtn").disabled = true;

      const answersContainer = document.getElementById("answersContainer");
      answersContainer.innerHTML = "";
      q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = option;
        btn.onclick = () => selectAnswer(option, q.answer, q.explanation);
        answersContainer.appendChild(btn);
      });

      updateScore();
    }

    function selectAnswer(selected, correct, explanation) {
      if (answered) return;
      answered = true;
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === correct) btn.classList.add("correct");
        if (btn.textContent === selected && selected !== correct) btn.classList.add("wrong");
      });

      if (selected === correct) {
        score++;
        document.getElementById("feedbackText").textContent = "Correct";
        document.getElementById("feedbackText").style.color = "#15803d";
      } else {
        document.getElementById("feedbackText").textContent = "Incorrect";
        document.getElementById("feedbackText").style.color = "#b91c1c";
      }

      document.getElementById("explanationText").textContent = `Answer: ${correct}. ${explanation}`;
      document.getElementById("nextBtn").disabled = false;
      updateScore();
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < selectedQuestions.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function updateScore() {
      document.getElementById("scoreBoard").textContent = `Score: ${score} / ${currentQuestionIndex + (answered ? 1 : 0)}`;
    }

    function showResults() {
      document.getElementById("quizSection").classList.add("hidden");
      document.getElementById("resultSection").classList.remove("hidden");

      const percent = Math.round((score / selectedQuestions.length) * 100);
      let message = "";

      if (percent >= 90) {
        message = "Excellent work. That transfer stayed on track.";
      } else if (percent >= 70) {
        message = "Nice job. Solid handling with only a few sidetracks.";
      } else if (percent >= 50) {
        message = "Not bad, but a few answers definitely jumped the rail.";
      } else {
        message = "Time for another round. Right now the process control is off the tracks.";
      }

      document.getElementById("finalScoreText").textContent = `You scored ${score} out of ${selectedQuestions.length} (${percent}%). ${message}`;
    }

    startQuiz();
  </script>
</body>
</html>
