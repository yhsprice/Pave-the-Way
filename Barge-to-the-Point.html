<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pave the Way | Barge to the Point</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f4f4f4, #e7ecef);
      color: #222;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      padding: 30px;
    }
    .main-title {
      text-align: center;
      font-size: 42px;
      margin-bottom: 8px;
      color: #1d3557;
    }
    .sub-title {
      text-align: center;
      font-size: 28px;
      margin-top: 0;
      margin-bottom: 10px;
      color: #444;
    }
    .tagline {
      text-align: center;
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
    }
    .quiz-box {
      background: #f8fafc;
      border: 2px solid #d9e2ec;
      border-radius: 16px;
      padding: 25px;
    }
    .progress {
      font-size: 15px;
      font-weight: bold;
      color: #555;
      margin-bottom: 12px;
    }
    .question-type {
      display: inline-block;
      background: #dbeafe;
      color: #1e3a8a;
      font-size: 13px;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 15px;
    }
    .question {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .answers {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }
    .answer-btn {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      background: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .answer-btn:hover {
      background: #eef6ff;
      border-color: #93c5fd;
    }
    .answer-btn.correct {
      background: #dcfce7;
      border-color: #22c55e;
      font-weight: bold;
    }
    .answer-btn.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      font-weight: bold;
    }
    .answer-btn:disabled { cursor: default; }
    .feedback {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 10px;
      min-height: 24px;
    }
    .explanation {
      font-size: 15px;
      color: #555;
      margin-bottom: 20px;
      min-height: 40px;
      line-height: 1.5;
    }
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .control-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .next-btn { background: #1d4ed8; color: white; }
    .next-btn:hover { background: #1e40af; }
    .restart-btn { background: #64748b; color: white; }
    .restart-btn:hover { background: #475569; }
    .home-btn { background: #0f766e; color: white; }
    .home-btn:hover { background: #115e59; }
    .score-board {
      margin-top: 20px;
      font-size: 17px;
      font-weight: bold;
      color: #1f2937;
    }
    .hidden { display: none; }
    .result-box {
      text-align: center;
      padding: 20px 10px;
    }
    .result-box h2 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #1d3557;
    }
    .result-box p {
      font-size: 20px;
      color: #444;
      line-height: 1.5;
    }
    @media (max-width: 700px) {
      .main-title { font-size: 34px; }
      .sub-title { font-size: 24px; }
      .question { font-size: 20px; }
      .container {
        margin: 20px 12px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="main-title">Pave the Way</h1>
    <h2 class="sub-title">🚢 Barge to the Point</h2>
    <p class="tagline">Test your knowledge of barge operations, coordination, loading control, and material movement.</p>

    <div id="quizSection" class="quiz-box">
      <div class="progress" id="progressText">Question 1 of 10</div>
      <div class="question-type" id="questionType">Multiple Choice</div>
      <div class="question" id="questionText"></div>
      <div class="answers" id="answersContainer"></div>
      <div class="feedback" id="feedbackText"></div>
      <div class="explanation" id="explanationText"></div>

      <div class="controls">
        <button class="control-btn next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next Question</button>
        <button class="control-btn restart-btn" onclick="startQuiz()">Restart Quiz</button>
        <a href="index.html"><button class="control-btn home-btn">Back to Home</button></a>
      </div>

      <div class="score-board" id="scoreBoard">Score: 0 / 0</div>
    </div>

    <div id="resultSection" class="quiz-box hidden">
      <div class="result-box">
        <h2>Quiz Complete</h2>
        <p id="finalScoreText"></p>
        <div class="controls" style="justify-content:center; margin-top: 20px;">
          <button class="control-btn restart-btn" onclick="startQuiz()">Play Again</button>
          <a href="index.html"><button class="control-btn home-btn">Back to Home</button></a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const allQuestions = [
      { type: "True / False", question: "Barge operations depend heavily on coordination, material handling, and safe loading practices.", options: ["True", "False"], answer: "True", explanation: "Barge work involves timing, movement, and safe handling." },
      { type: "True / False", question: "Poor coordination during barge loading can create delays and safety issues.", options: ["True", "False"], answer: "True", explanation: "Poor coordination tends to spread problems fast." },
      { type: "True / False", question: "Barge operations require less planning than truck-only delivery.", options: ["True", "False"], answer: "False", explanation: "Barge operations usually require serious coordination." },
      { type: "Multiple Choice", question: "What is one major need in barge operations?", options: ["A. Random loading", "B. Coordination and controlled material movement", "C. Less communication", "D. More guessing"], answer: "B. Coordination and controlled material movement", explanation: "Barge work depends on timing and control." },
      { type: "Multiple Choice", question: "Why is loading control important in barge operations?", options: ["A. It affects only paperwork", "B. It helps maintain efficiency, safety, and proper material handling", "C. It improves office seating", "D. It changes river current"], answer: "B. It helps maintain efficiency, safety, and proper material handling", explanation: "Loading control supports both safe operation and production flow." },
      { type: "Multiple Choice", question: "What can poor material tracking during barge operations lead to?", options: ["A. Better forecasting", "B. Confusion, delays, or product handling errors", "C. Cleaner boots", "D. Lower training needs"], answer: "B. Confusion, delays, or product handling errors", explanation: "Tracking matters when materials are moving through multiple steps." },
      { type: "Multiple Choice", question: "A barge loading sequence is poorly coordinated. What is the most likely result?", options: ["A. Better communication", "B. Delays, material issues, or safety problems", "C. Stronger asphalt", "D. Cleaner trucks"], answer: "B. Delays, material issues, or safety problems", explanation: "Poor coordination in barge operations quickly creates operational headaches." },
      { type: "Multiple Choice", question: "Why is pre-planning especially important in barge material movement?", options: ["A. It removes all risk", "B. It helps avoid delays, confusion, and handling mistakes", "C. It changes the cargo type", "D. It improves water level"], answer: "B. It helps avoid delays, confusion, and handling mistakes", explanation: "Good pre-planning prevents predictable chaos." },
      { type: "Fill in the Blank", question: "Barge loading requires safe handling and clear ______.", options: ["communication", "advertising", "painting", "survey stakes"], answer: "communication", explanation: "Without communication, movement and loading get messy fast." },
      { type: "Fill in the Blank", question: "In barge work, poor coordination can affect safety, timing, and material ______.", options: ["control", "music", "weather", "uniforms"], answer: "control", explanation: "Controlled movement is the whole game." },
      { type: "Multiple Choice", question: "A barge operation falls behind because different crews are not working from the same sequence. What is the root problem?", options: ["A. Too many life jackets", "B. Poor coordination and sequencing", "C. Too much documentation", "D. Not enough paint"], answer: "B. Poor coordination and sequencing", explanation: "When crews are out of sync, delays and errors pile up." },
      { type: "Multiple Choice", question: "What is one important concern in barge material movement?", options: ["A. Proper coordination and loading control", "B. Office carpet selection", "C. Concrete paint color", "D. Sidewalk striping"], answer: "A. Proper coordination and loading control", explanation: "Barge operations depend on controlled loading and coordinated movement." }
    ];

    const totalQuestionsPerRound = 10;
    let selectedQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function shuffleArray(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function startQuiz() {
      selectedQuestions = shuffleArray(allQuestions).slice(0, totalQuestionsPerRound);
      currentQuestionIndex = 0;
      score = 0;
      answered = false;
      document.getElementById("quizSection").classList.remove("hidden");
      document.getElementById("resultSection").classList.add("hidden");
      showQuestion();
      updateScore();
    }

    function showQuestion() {
      answered = false;
      const q = selectedQuestions[currentQuestionIndex];
      document.getElementById("progressText").textContent = `Question ${currentQuestionIndex + 1} of ${selectedQuestions.length}`;
      document.getElementById("questionType").textContent = q.type;
      document.getElementById("questionText").textContent = q.question;
      document.getElementById("feedbackText").textContent = "";
      document.getElementById("explanationText").textContent = "";
      document.getElementById("nextBtn").disabled = true;

      const answersContainer = document.getElementById("answersContainer");
      answersContainer.innerHTML = "";
      q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = option;
        btn.onclick = () => selectAnswer(option, q.answer, q.explanation);
        answersContainer.appendChild(btn);
      });

      updateScore();
    }

    function selectAnswer(selected, correct, explanation) {
      if (answered) return;
      answered = true;
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === correct) btn.classList.add("correct");
        if (btn.textContent === selected && selected !== correct) btn.classList.add("wrong");
      });

      if (selected === correct) {
        score++;
        document.getElementById("feedbackText").textContent = "Correct";
        document.getElementById("feedbackText").style.color = "#15803d";
      } else {
        document.getElementById("feedbackText").textContent = "Incorrect";
        document.getElementById("feedbackText").style.color = "#b91c1c";
      }

      document.getElementById("explanationText").textContent = `Answer: ${correct}. ${explanation}`;
      document.getElementById("nextBtn").disabled = false;
      updateScore();
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < selectedQuestions.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function updateScore() {
      document.getElementById("scoreBoard").textContent = `Score: ${score} / ${currentQuestionIndex + (answered ? 1 : 0)}`;
    }

    function showResults() {
      document.getElementById("quizSection").classList.add("hidden");
      document.getElementById("resultSection").classList.remove("hidden");

      const percent = Math.round((score / selectedQuestions.length) * 100);
      let message = "";

      if (percent >= 90) {
        message = "Excellent work. That barge stayed on course.";
      } else if (percent >= 70) {
        message = "Nice job. Solid coordination with only a little drift.";
      } else if (percent >= 50) {
        message = "Not bad, but some of those answers drifted off the route.";
      } else {
        message = "Time for another round. Right now the operation is floating a little too loose.";
      }

      document.getElementById("finalScoreText").textContent = `You scored ${score} out of ${selectedQuestions.length} (${percent}%). ${message}`;
    }

    startQuiz();
  </script>
</body>
</html>
